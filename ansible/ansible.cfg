[defaults]
inventory         = inventory.ini
host_key_checking = False
remote_user       = ubuntu
# Private key injected into each VM by Terraform cloud-init (var.ssh_public_key
# in terraform/terraform.tfvars). The matching private key must exist here.
# Generate if missing: ssh-keygen -t ed25519 -f ~/.ssh/k3s
private_key_file  = ~/.ssh/k3s
# k3s-ansible vendor roles — required when importing vendor/k3s-ansible/playbooks/site.yml
roles_path        = vendor/k3s-ansible/roles
