# k3s cluster inventory. Fill in the IPs after `terraform apply`
# (they match terraform.tfvars).

[server]
k3s-server-1 ansible_host=192.168.10.41
k3s-server-2 ansible_host=192.168.10.42
k3s-server-3 ansible_host=192.168.10.43

[agent]
k3s-agent-1 ansible_host=192.168.10.44   # observability + apps
k3s-agent-2 ansible_host=192.168.10.45   # lightweight workloads

[k3s_cluster:children]
server
agent
