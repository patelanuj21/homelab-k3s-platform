# Argo CD Application: monitoring (kube-prometheus-stack -- Prometheus,
# Alertmanager, Grafana, kube-state-metrics, the Prometheus Operator).
# All components pinned to k3s-agent-1 (the node sized for observability).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "65.5.1"
      helm:
        valueFiles:
          - $values/gitops/manifests/monitoring/values.yaml
    - repoURL: https://github.com/patelanuj21/homelab-k3s-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply is required: this chart's CRDs (Prometheus,
    # Alertmanager, ThanosRuler, etc.) are large enough that client-side
    # apply's kubectl.kubernetes.io/last-applied-configuration annotation
    # exceeds Kubernetes' 262144-byte annotation limit.
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
