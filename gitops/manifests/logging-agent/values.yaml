# Alloy runs as a DaemonSet across ALL nodes (servers + both agents) --
# unlike the rest of observability, it is NOT pinned to k3s-agent-1, since it
# needs to collect logs from every node, not just the observability node.
controller:
  type: daemonset

alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.logging.svc.cluster.local:3100/loki/api/v1/push"
        }
      }
