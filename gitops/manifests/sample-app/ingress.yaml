# Routed through Traefik, not its own LoadBalancer Service -- see the
# policy invariant comment in gitops/manifests/traefik/values.yaml.
#
# Pilot for the DNS+TLS cutover: sample.anujpatel.net does not resolve
# anywhere automatically -- see docs/dns-tls.md for the required Pi-hole
# local DNS record (and, for off-LAN access, the cloudflared tunnel
# ingress rule) pointing it at Traefik's MetalLB external IP
# (kubectl -n traefik get svc). TLS is served from the wildcard cert via
# Traefik's default TLS store; the empty tls.secretName here just tells
# Traefik to terminate this host on the websecure entrypoint.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: sample-app
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - sample.anujpatel.net
  rules:
    - host: sample.anujpatel.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port: { number: 80 }
