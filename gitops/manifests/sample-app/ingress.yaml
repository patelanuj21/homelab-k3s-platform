# Routed through Traefik, not its own LoadBalancer Service -- see the
# policy invariant comment in gitops/manifests/traefik/values.yaml.
#
# sample-app.homelab.local will not resolve anywhere automatically; add a
# manual /etc/hosts (or LAN DNS) entry pointing it at Traefik's MetalLB
# external IP (kubectl -n traefik get svc) after Traefik syncs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: sample-app
spec:
  ingressClassName: traefik
  rules:
    - host: sample-app.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port: { number: 80 }
