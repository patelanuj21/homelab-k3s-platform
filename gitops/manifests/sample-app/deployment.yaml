# Placeholder workload. Replace with a real container image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: sample-app }
  template:
    metadata:
      labels: { app: sample-app }
    spec:
      # lightweight workloads run on k3s-agent-2:
      nodeSelector: { kubernetes.io/hostname: k3s-agent-2 }
      containers:
        - name: sample-app
          image: nginx:1.27-alpine
          ports:
            - { name: http, containerPort: 80 }
