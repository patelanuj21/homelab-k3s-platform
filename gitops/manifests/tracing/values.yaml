# Tempo single-binary chart -- pinned to k3s-agent-1 like the rest of
# observability. OTLP gRPC/HTTP receivers are enabled by default in recent
# chart versions.
tempo:
  nodeSelector: { kubernetes.io/hostname: k3s-agent-1 }

persistence:
  enabled: true
  storageClassName: local-path
  size: 10Gi
