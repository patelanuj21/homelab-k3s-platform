# POLICY INVARIANT: this is the ONLY Application in the whole platform that
# should get service.type: LoadBalancer. MetalLB's LAN pool is only ~10 IPs
# (192.168.10.50-59) -- every other app must be ClusterIP + routed through
# Traefik ingress by hostname. Do not add a second LoadBalancer Service.
service:
  type: LoadBalancer
  # Pin to the first IP in MetalLB's lan-pool -- stable, memorable address
  # for the one Service every DNS record in docs/dns-tls.md points at.
  annotations:
    metallb.io/loadBalancerIPs: 192.168.10.50

ingressClass:
  enabled: true
  isDefaultClass: true

ports:
  web:
    # Redirect all plain-HTTP traffic to HTTPS.
    redirectTo:
      port: websecure

# Wildcard *.anujpatel.net cert from cert-manager (see
# gitops/manifests/cert-manager-config/wildcard-certificate.yaml) as the
# default cert for any Ingress host that doesn't specify its own.
tlsStore:
  default:
    defaultCertificate:
      secretName: wildcard-anujpatel-net-tls
