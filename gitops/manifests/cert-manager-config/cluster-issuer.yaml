# ACME DNS-01 issuer via Cloudflare, for anujpatel.net.
#
# Depends on a Secret this repo does NOT create -- run once, before this
# Application syncs successfully:
#
#   kubectl create secret generic cloudflare-api-token-secret \
#     -n cert-manager --from-literal=api-token=<CF_API_TOKEN>
#
# Token needs Zone:DNS:Edit scoped to the anujpatel.net zone only.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: patel.anuj21@gmail.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
