# Single-node-class Loki deployment (not HA) -- homelab scale.
# Grafana/Prometheus already come from kube-prometheus-stack; disable this
# chart's bundled copies so we don't run duplicate stacks.
#
# deploymentMode must be explicit: the chart defaults to SimpleScalable
# (separate read/write/backend replicas), which conflicts with also setting
# singleBinary.replicas > 0.
deploymentMode: SingleBinary

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  nodeSelector: { kubernetes.io/hostname: k3s-agent-1 }
  persistence:
    storageClass: local-path
    size: 10Gi

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

test:
  enabled: false
